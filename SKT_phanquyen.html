<div class="header-card mb-3 p-3 bg-white rounded shadow-sm border-top border-primary border-3">
    <h1 class="page-title m-0 text-primary" style="font-size: 18px; font-weight: bold; text-transform: uppercase;">QUẢN LÝ QUYỀN TRUY CẬP VÀ BỘ PHẬN</h1>
</div>

<ul class="nav nav-tabs mb-2" style="font-family: 'Times New Roman', serif; font-size: 16px;">
  <li class="nav-item">
    <a class="nav-link active fw-bold text-primary" id="btn-tab-1-1" href="#" onclick="chuyenTabPQ('tab-1-1', this)" style="cursor:pointer;">1.1 Quyền truy cập</a>
  </li>
  <li class="nav-item">
    <a class="nav-link fw-bold text-secondary" id="btn-tab-1-2" href="#" onclick="chuyenTabPQ('tab-1-2', this)" style="cursor:pointer;">1.2 Khai báo bộ phận</a>
  </li>
</ul>

<div class="bg-white p-3 rounded shadow-sm border d-flex flex-column" style="height: calc(100vh - 160px);">
    
    <div id="tab-1-1" class="khung-tab-pq d-flex flex-column" style="height: 100%;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="d-flex align-items-center gap-2">
                <label for="inp-phamvi" class="fw-bold mb-0" style="white-space: nowrap; color: #1e3a8a;">Phạm vi đối tượng:</label>
                <input type="text" id="inp-phamvi" class="form-control form-control-sm" style="width: 250px; font-family: 'Times New Roman';" placeholder="Nhập phạm vi (Ví dụ: all)">
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-success fw-bold" onclick="addRowPQ()">
                    <i class="bi bi-plus-circle"></i> Thêm mới
                </button>
                <button class="btn btn-sm btn-primary fw-bold" onclick="savePhanQuyen()">
                    <i class="bi bi-save"></i> Cập nhật
                </button>
            </div>
        </div>
        
        <div class="table-container flex-grow-1" style="overflow-y: auto; border: 1px solid #9ca3af;">
            <table class="table table-bordered table-hover mb-0" id="tb-phanquyen">
                <thead class="table-primary sticky-top" style="z-index: 5;">
                    <tr>
                        <th style="width: 50px;" class="text-center">Xóa</th>
                        <th style="width: 60px;" class="text-center">STT</th>
                        <th style="width: 35%;">Họ và tên</th>
                        <th style="width: 35%;">Email</th>
                        <th style="width: 15%;">Quyền</th>
                    </tr>
                </thead>
                <tbody id="tb-phanquyen-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="tab-1-2" class="khung-tab-pq d-none flex-column" style="height: 100%;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="m-0 fw-bold" style="color: #1e3a8a; font-size: 16px; text-transform: uppercase;">KHAI BÁO BỘ PHẬN TỔ CHỨC</h4>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-success fw-bold" onclick="addRowBP()">
                    <i class="bi bi-plus-circle"></i> Thêm mới
                </button>
                <button class="btn btn-sm btn-primary fw-bold" onclick="saveBoPhan()">
                    <i class="bi bi-save"></i> Cập nhật
                </button>
            </div>
        </div>
        
        <div class="table-container flex-grow-1" style="overflow-y: auto; border: 1px solid #9ca3af;">
            <table class="table table-bordered table-hover mb-0" id="tb-bophan">
                <thead class="table-success sticky-top" style="z-index: 5;">
                    <tr>
                        <th style="width: 50px;" class="text-center">Xóa</th>
                        <th style="width: 60px;" class="text-center">STT</th>
                        <th style="width: 60%;">Tên bộ phận</th>
                        <th style="width: 40%;">Mã bộ phận</th>
                    </tr>
                </thead>
                <tbody id="tb-bophan-body">
                    </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    // -----------------------------------------------------
    // LOGIC ĐIỀU HƯỚNG TAB
    // -----------------------------------------------------
    function chuyenTabPQ(tabId, btn) {
        document.querySelectorAll('.khung-tab-pq').forEach(el => {
            el.classList.remove('d-flex');
            el.classList.add('d-none');
        });
        
        document.getElementById(tabId).classList.remove('d-none');
        document.getElementById(tabId).classList.add('d-flex');
        
        document.querySelectorAll('#btn-tab-1-1, #btn-tab-1-2').forEach(el => {
            el.classList.remove('active', 'text-primary');
            el.classList.add('text-secondary');
        });
        
        btn.classList.add('active', 'text-primary');
        btn.classList.remove('text-secondary');
    }

    // -----------------------------------------------------
    // KHỐI 1.1: QUẢN LÝ QUYỀN TRUY CẬP
    // -----------------------------------------------------
    function loadPhanQuyen() {
        document.getElementById('instant-loader').style.display = 'flex';
        google.script.run
            .withSuccessHandler(kq => {
                document.getElementById('instant-loader').style.display = 'none';
                if (!kq.tcon) {
                    alert("Lỗi tải dữ liệu quyền: " + kq.tbao);
                    return;
                }
                
                document.getElementById('inp-phamvi').value = kq.phamvi;
                const tbody = document.getElementById('tb-phanquyen-body');
                tbody.innerHTML = '';
                
                if (kq.dlieu && kq.dlieu.length > 0) {
                    for (let i = kq.dlieu.length - 1; i >= 0; i--) {
                        let row = kq.dlieu[i];
                        if (String(row[1]).trim() !== '' || String(row[2]).trim() !== '') { 
                            addRowPQ(row[1], row[2], row[3]);
                        }
                    }
                }
                updateSTTPQ();
                
                // Nạp luôn dữ liệu bộ phận
                loadBoPhan();
            })
            .withFailureHandler(err => {
                document.getElementById('instant-loader').style.display = 'none';
                alert("Lỗi kết nối máy chủ khi tải quyền: " + err.message);
            })
            .skt_lay_phanquyen();
    }
    
    function addRowPQ(ten = '', email = '', quyen = '') {
        const tbody = document.getElementById('tb-phanquyen-body');
        const tr = document.createElement('tr');
        
        let valQuyen = String(quyen).toLowerCase().trim();
        let selTrong = (valQuyen !== 'x' && valQuyen !== 'xx') ? 'selected' : '';
        let selX = valQuyen === 'x' ? 'selected' : '';
        let selXX = valQuyen === 'xx' ? 'selected' : '';
        
        tr.innerHTML = `
            <td class="text-center align-middle">
                <button class="btn-icon-del" onclick="deleteRowPQ(this)" title="Xóa dòng"><i class="bi bi-trash"></i></button>
            </td>
            <td class="text-center align-middle fw-bold stt-col" style="color: #64748b;"></td>
            <td><input type="text" class="cell-input ten-col" value="${ten}" placeholder="Nhập họ và tên..."></td>
            <td><input type="text" class="cell-input email-col" value="${email}" placeholder="Nhập email..."></td>
            <td>
                <select class="cell-input quyen-col" style="cursor:pointer; text-align: center;">
                    <option value="" ${selTrong}>Người được kiểm tra</option>
                    <option value="x" ${selX}>Người kiểm tra</option>
                    <option value="xx" ${selXX}>Quyền vip</option>
                </select>
            </td>
        `;
        
        if (tbody.firstChild) {
            tbody.insertBefore(tr, tbody.firstChild);
        } else {
            tbody.appendChild(tr);
        }
        
        updateSTTPQ();
    }
    
    function deleteRowPQ(btn) {
        if (confirm("Thầy/Cô có chắc chắn muốn xóa dòng quyền này?")) {
            btn.closest('tr').remove();
            updateSTTPQ();
        }
    }
    
    function updateSTTPQ() {
        const rows = document.getElementById('tb-phanquyen-body').querySelectorAll('tr');
        rows.forEach((row, idx) => {
            row.querySelector('.stt-col').innerText = idx + 1;
        });
    }
    
    function savePhanQuyen() {
        const phamvi = document.getElementById('inp-phamvi').value.trim();
        const rows = document.getElementById('tb-phanquyen-body').querySelectorAll('tr');
        const mangdl = [];
        let tonTaiNguoiXX = false; 
        
        rows.forEach((row, idx) => {
            const ten = row.querySelector('.ten-col').value.trim();
            const email = row.querySelector('.email-col').value.trim();
            const quyen = row.querySelector('.quyen-col').value.trim();
            
            if (quyen === 'xx') tonTaiNguoiXX = true;
            
            if (ten !== '' || email !== '') {
                mangdl.push([idx + 1, ten, email, quyen]);
            }
        });
        
        if (!tonTaiNguoiXX) {
            alert("⛔ TỪ CHỐI CẬP NHẬT:\nHệ thống yêu cầu phải có tối thiểu 1 người dùng được cấp quyền 'xx' để đảm bảo duy trì quyền quản trị cấp cao!");
            return;
        }
        
        if (mangdl.length === 0 && !confirm("Danh sách hiện đang trống. Thầy/Cô có chắc chắn muốn xóa toàn bộ danh sách cấp quyền?")) {
            return;
        }
        
        document.getElementById('instant-loader').style.display = 'flex';
        google.script.run
            .withSuccessHandler(kq => {
                document.getElementById('instant-loader').style.display = 'none';
                if (kq.tcon) {
                    alert("✅ " + kq.tbao);
                    loadPhanQuyen(); 
                } else {
                    alert("⛔ Lỗi cập nhật: " + kq.tbao);
                }
            })
            .withFailureHandler(err => {
                document.getElementById('instant-loader').style.display = 'none';
                alert("Lỗi kết nối máy chủ: " + err.message);
            })
            .skt_luu_phanquyen(phamvi, mangdl);
    }

    // -----------------------------------------------------
    // KHỐI 1.2: QUẢN LÝ BỘ PHẬN TỔ CHỨC
    // -----------------------------------------------------
    function loadBoPhan() {
        google.script.run
            .withSuccessHandler(kq => {
                if (!kq.tcon) {
                    console.error("Lỗi tải bộ phận:", kq.tbao);
                    return;
                }
                
                const tbody = document.getElementById('tb-bophan-body');
                tbody.innerHTML = '';
                
                if (kq.dlieu && kq.dlieu.length > 0) {
                    for (let i = kq.dlieu.length - 1; i >= 0; i--) {
                        let row = kq.dlieu[i];
                        if (String(row[0]).trim() !== '' || String(row[1]).trim() !== '') { 
                            addRowBP(row[0], row[1]);
                        }
                    }
                }
                updateSTTBP();
            })
            .withFailureHandler(err => {
                console.error("Lỗi kết nối tải bộ phận:", err.message);
            })
            .skt_lay_bophan();
    }

    function addRowBP(tenbp = '', mabp = '') {
        const tbody = document.getElementById('tb-bophan-body');
        const tr = document.createElement('tr');
        
        tr.innerHTML = `
            <td class="text-center align-middle">
                <button class="btn-icon-del" onclick="deleteRowBP(this)" title="Xóa dòng"><i class="bi bi-trash"></i></button>
            </td>
            <td class="text-center align-middle fw-bold stt-col-bp" style="color: #64748b;"></td>
            <td><input type="text" class="cell-input ten-bp-col" value="${tenbp}" placeholder="Nhập tên bộ phận..."></td>
            <td><input type="text" class="cell-input ma-bp-col" value="${mabp}" placeholder="Nhập mã bộ phận..."></td>
        `;
        
        // Luôn chèn dòng mới lên đầu tiên
        if (tbody.firstChild) {
            tbody.insertBefore(tr, tbody.firstChild);
        } else {
            tbody.appendChild(tr);
        }
        
        updateSTTBP();
    }

    function deleteRowBP(btn) {
        if (confirm("Thầy/Cô có chắc chắn muốn xóa bộ phận này?")) {
            btn.closest('tr').remove();
            updateSTTBP();
        }
    }

    function updateSTTBP() {
        const rows = document.getElementById('tb-bophan-body').querySelectorAll('tr');
        rows.forEach((row, idx) => {
            row.querySelector('.stt-col-bp').innerText = idx + 1;
        });
    }

    function saveBoPhan() {
        const rows = document.getElementById('tb-bophan-body').querySelectorAll('tr');
        const mangdl = [];
        
        rows.forEach((row) => {
            const tenbp = row.querySelector('.ten-bp-col').value.trim();
            const mabp = row.querySelector('.ma-bp-col').value.trim();
            
            if (tenbp !== '' || mabp !== '') {
                mangdl.push([tenbp, mabp]);
            }
        });
        
        document.getElementById('instant-loader').style.display = 'flex';
        google.script.run
            .withSuccessHandler(kq => {
                document.getElementById('instant-loader').style.display = 'none';
                if (kq.tcon) {
                    alert("✅ " + kq.tbao);
                    loadBoPhan(); 
                } else {
                    alert("⛔ Lỗi cập nhật bộ phận: " + kq.tbao);
                }
            })
            .withFailureHandler(err => {
                document.getElementById('instant-loader').style.display = 'none';
                alert("Lỗi kết nối máy chủ khi lưu bộ phận: " + err.message);
            })
            .skt_luu_bophan(mangdl);
    }
</script>
